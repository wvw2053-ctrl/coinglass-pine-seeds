name: Update Coinglass Liquidation Data

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Manual trigger via GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Coinglass data
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
        run: python fetch_liquidations.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/ symbol_info/
          git diff --cached --quiet || (git commit -m "Update liquidation data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)

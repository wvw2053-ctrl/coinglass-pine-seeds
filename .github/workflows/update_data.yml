name: Update BTC Liquidation & Market Data

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # No pip install needed - script uses only Python stdlib (urllib)

      - name: Fetch market data and calculate liquidation levels
        run: python fetch_liquidations.py all

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/ symbol_info/
          git diff --cached --quiet || (git commit -m "Update liquidation data $(date -u +%H:%M)" && git push)
